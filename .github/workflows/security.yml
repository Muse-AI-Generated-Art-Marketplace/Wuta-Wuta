name: Security Analysis

on:
  push:
    branches: [ main, develop, 'feature/*' ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 0 * * 1' # Weekly on Monday

permissions: write-all

jobs:
  smart-contract-security:
    name: Smart Contract Security
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install
      
    - name: Compile contracts
      run: npx hardhat compile
      
    - name: Run Slither
      uses: crytic/slither-action@v0.4.0
      id: slither
      with:
        target: '.'
        slither-args: '--filter-paths "node_modules/" --exclude naming-convention,external-function'
        sarif-file: slither.sarif
        json-file: slither-results.json
        fail-on: none
        
    - name: List files (Debug)
      run: ls -R
      
    - name: Upload Slither SARIF
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: slither.sarif
        
    - name: Upload Slither JSON
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: slither-results
        path: slither-results.json
        
    - name: Run Mythril
      run: |
        pip install mythril
        myth analyze contracts/MuseNFT.sol --solv 0.8.19 --outfile mythril-results.json || true
      continue-on-error: true
      
    - name: Upload Mythril results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: mythril-results
        path: mythril-results.json

  dependency-security:
    name: Dependency Security
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install
      
    - name: Run npm audit
      run: npm audit --json > npm-audit.json || true
      
    - name: Upload npm audit results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: npm-audit-results
        path: npm-audit.json
        
    - name: Run Snyk security scan
      uses: snyk/actions/node@master
      continue-on-error: true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high

  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install
      
    - name: Run SonarCloud scan
      if: secrets.SONAR_TOKEN != ''
      uses: SonarSource/sonarqube-scan-action@v5.0.0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.organization=muse-ai-generated-art-marketplace
          -Dsonar.projectKey=Muse-AI-Generated-Art-Marketplace_Wuta-Wuta
          -Dsonar.sources=src,contracts
          -Dsonar.host.url=https://sonarcloud.io
        
    - name: Run CodeQL analysis
      uses: github/codeql-action/init@v4
      with:
        languages: javascript
        
    - name: Autobuild
      uses: github/codeql-action/autobuild@v4
      
    - name: Perform CodeQL analysis
      uses: github/codeql-action/analyze@v4

  fuzz-testing:
    name: Fuzz Testing
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install
      
    - name: Run Echidna fuzz testing
      uses: crytic/echidna-action@v0.2.0
      with:
        files: test/fuzz/MuseNFTFuzz.sol
        contract: MuseNFTFuzz
      continue-on-error: true

  formal-verification:
    name: Formal Verification
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install
      
    - name: Install Certora
      run: |
        pip install certora-cli
      continue-on-error: true
      
    - name: Run Certora verification
      run: |
        # Create a simple spec if not exists
        if [ ! -f "certora/MuseNFT.spec" ]; then
          mkdir -p certora
          cat > certora/MuseNFT.spec << 'EOF'
        // Simple Certora specification
        methods {
            // Add specification methods here
        }
        EOF
        fi
        
        certoraRun contracts/MuseNFT.sol certora/MuseNFT.spec || true
      continue-on-error: true

  security-report:
    name: Security Report
    runs-on: ubuntu-latest
    needs: [smart-contract-security, dependency-security, code-quality, fuzz-testing, formal-verification]
    if: always()
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      
    - name: Generate security report
      run: |
        echo "# Security Analysis Report" > security-report.md
        echo "Generated on: $(date)" >> security-report.md
        echo "" >> security-report.md
        echo "## Summary" >> security-report.md
        echo "- Smart Contract Security: ${{ needs.smart-contract-security.result }}" >> security-report.md
        echo "- Dependency Security: ${{ needs.dependency-security.result }}" >> security-report.md
        echo "- Code Quality: ${{ needs.code-quality.result }}" >> security-report.md
        echo "- Fuzz Testing: ${{ needs.fuzz-testing.result }}" >> security-report.md
        echo "- Formal Verification: ${{ needs.formal-verification.result }}" >> security-report.md
        echo "" >> security-report.md
        echo "## Detailed Results" >> security-report.md
        
        if [ -f "slither-results/slither-results.json" ]; then
          echo "### Slither Analysis" >> security-report.md
          echo "\`\`\`json" >> security-report.md
          cat slither-results/slither-results.json | head -50 >> security-report.md
          echo "\`\`\`" >> security-report.md
        fi
        
        if [ -f "npm-audit-results/npm-audit.json" ]; then
          echo "### NPM Audit Results" >> security-report.md
          echo "\`\`\`json" >> security-report.md
          cat npm-audit-results/npm-audit.json | head -50 >> security-report.md
          echo "\`\`\`" >> security-report.md
        fi
        
    - name: Upload security report
      uses: actions/upload-artifact@v4
      with:
        name: security-report
        path: security-report.md
        
    - name: Comment PR with security report
      if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const report = fs.readFileSync('security-report.md', 'utf8');
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: report
          });
